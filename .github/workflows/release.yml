name: Release

# Push a version tag to trigger:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Output a STABLE, unversioned filename so the install one-liner
      # (releases/latest/download/batrunner.vsix) keeps working across versions.
      - name: Package .vsix
        run: npx vsce package -o batrunner.vsix

      - name: Attach .vsix to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: batrunner.vsix

      # OPTIONAL: also publish to Open VSX (open-vsx.org) so the extension is
      # searchable inside Cursor / VSCodium / Gitpod. Runs only if you add a
      # repository secret named OVSX_PAT. Requires the package.json "publisher"
      # to match a namespace you created on open-vsx.org.
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish batrunner.vsix -p "$OVSX_PAT"
