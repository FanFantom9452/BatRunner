name: Release

# Push a version tag to trigger:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package .vsix
        run: npx vsce package

      - name: Attach .vsix to a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'

      # Optional: also publish to the VS Code Marketplace.
      # Only runs if you add a repository secret named VSCE_PAT.
      - name: Publish to Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx vsce publish -p "$VSCE_PAT"
